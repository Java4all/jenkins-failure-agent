version: '3.8'

# Jenkins Failure Analysis Agent - Complete Local Stack
# 
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose logs -f agent      # Watch agent logs
#   docker-compose exec agent bash    # Shell into agent
#
# Services:
#   - ollama: Local AI model server (llama3:8b by default)
#   - agent: The failure analysis agent (API mode)
#   - ui: Web dashboard for analysis
#   - jenkins: Optional local Jenkins for testing
#
# Analysis Modes:
#   - Scripted (Fast): Single LLM call, ~2 seconds
#   - Agentic (Deep): Multi-step MCP tools, ~30+ seconds
#
# For deep investigation, consider using llama3:70b or deepseek-coder:33b
#
# First run will download ~4GB for the AI model

services:
  # =============================================================================
  # Ollama - Local AI Model Server
  # =============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support (uncomment for NVIDIA GPU - recommended for larger models)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # Model Loader - Pulls the AI model on first run
  # =============================================================================
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling AI model (this may take a few minutes on first run)..."
        ollama pull ${AI_MODEL:-llama3:8b}
        echo "Model ready!"
    environment:
      - OLLAMA_HOST=ollama:11434
    restart: "no"

  # =============================================================================
  # Jenkins Failure Analysis Agent (API Server)
  # =============================================================================
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins-failure-agent
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - agent_data:/app/data
      - agent_reports:/app/reports
    environment:
      # AI Configuration (uses Ollama container)
      - AI_BASE_URL=http://ollama:11434/v1
      - AI_MODEL=${AI_MODEL:-llama3:8b}
      - AI_API_KEY=ollama
      - AI_TIMEOUT=${AI_TIMEOUT:-120}
      
      # Jenkins Configuration (override in .env or config.yaml)
      - JENKINS_URL=${JENKINS_URL:-http://jenkins:8080}
      - JENKINS_USERNAME=${JENKINS_USERNAME:-admin}
      - JENKINS_API_TOKEN=${JENKINS_API_TOKEN:-}
      
      # GitHub Enterprise Configuration (for fetching source code)
      - GITHUB_BASE_URL=${GITHUB_BASE_URL:-https://api.github.com}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_ENABLED=${GITHUB_ENABLED:-false}
      
      # SCM Configuration (for PR comments)
      - SCM_PROVIDER=${SCM_PROVIDER:-github}
      - SCM_API_URL=${SCM_API_URL:-https://api.github.com}
      - SCM_TOKEN=${SCM_TOKEN:-}
      - SCM_ENABLED=${SCM_ENABLED:-false}
      - SCM_AUTO_COMMENT=${SCM_AUTO_COMMENT:-true}
      - SCM_SET_COMMIT_STATUS=${SCM_SET_COMMIT_STATUS:-true}
      
      # Reporter settings
      - UPDATE_JENKINS_DESCRIPTION=${UPDATE_JENKINS_DESCRIPTION:-true}
      - POST_TO_PR=${POST_TO_PR:-true}
      
      # Agent server settings
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    command: ["python", "agent.py", "serve", "--host", "0.0.0.0", "--port", "8080"]

  # =============================================================================
  # Web UI - Dashboard for Analysis
  # =============================================================================
  ui:
    image: nginx:alpine
    container_name: jenkins-failure-ui
    ports:
      - "3000:80"
    volumes:
      - ./ui/index.html:/usr/share/nginx/html/index.html:ro
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - agent
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # =============================================================================
  # Jenkins (Optional) - For local testing
  # =============================================================================
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    profiles:
      - with-jenkins  # Only starts with: docker-compose --profile with-jenkins up
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # Agent CLI - For one-off analysis commands
  # =============================================================================
  agent-cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins-failure-agent-cli
    profiles:
      - cli  # Only starts with: docker-compose --profile cli run agent-cli <command>
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - agent_reports:/app/reports
    environment:
      - AI_BASE_URL=http://ollama:11434/v1
      - AI_MODEL=${AI_MODEL:-llama3:8b}
      - AI_API_KEY=ollama
      - JENKINS_URL=${JENKINS_URL:-http://jenkins:8080}
      - JENKINS_USERNAME=${JENKINS_USERNAME:-admin}
      - JENKINS_API_TOKEN=${JENKINS_API_TOKEN:-}
      - GITHUB_BASE_URL=${GITHUB_BASE_URL:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - SCM_PROVIDER=${SCM_PROVIDER:-github}
      - SCM_TOKEN=${SCM_TOKEN:-}
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["python", "agent.py"]

volumes:
  ollama_data:
    name: jenkins-agent-ollama
  agent_data:
    name: jenkins-agent-data
  agent_reports:
    name: jenkins-agent-reports
  jenkins_home:
    name: jenkins-agent-jenkins

networks:
  default:
    name: jenkins-failure-agent-network
