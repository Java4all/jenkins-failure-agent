                                                <div>
                                                    <p className="text-gray-200">{rec.action}</p>
                                                    {rec.estimated_effort && (
                                                        <span className="text-xs text-gray-500"><i className="fas fa-clock mr-1"></i>{rec.estimated_effort}</span>
                                                    )}
                                                </div>
                                            </div>
                                            <i className={`fas fa-chevron-${expandedRec === i ? 'up' : 'down'} text-gray-500`}></i>
                                        </div>
                                        
                                        {expandedRec === i && (
                                            <div className="mt-4 pt-4 border-t border-gray-600 space-y-3">
                                                {rec.rationale && (
                                                    <div>
                                                        <span className="text-sm text-gray-400">Why:</span>
                                                        <p className="text-gray-300 mt-1">{rec.rationale}</p>
                                                    </div>
                                                )}
                                                {rec.code_suggestion && (
                                                    <div>
                                                        <span className="text-sm text-gray-400">Suggested Code:</span>
                                                        <pre className="mt-2 p-3 bg-gray-900 rounded-lg overflow-x-auto text-sm text-green-300 font-mono">
                                                            {rec.code_suggestion}
                                                        </pre>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        {activeTab === 'details' && (
                            <div className="space-y-4">
                                {root_cause?.details && (
                                    <Collapsible title="Full Analysis Details" icon="fas fa-file-alt" defaultOpen={true}>
                                        <div className="whitespace-pre-wrap text-gray-300 text-sm">{root_cause.details}</div>
                                    </Collapsible>
                                )}
                                
                                {failure_analysis?.primary_error && (
                                    <Collapsible title="Primary Error" icon="fas fa-exclamation-triangle">
                                        <pre className="p-3 bg-gray-900 rounded-lg overflow-x-auto text-sm text-red-300 font-mono">
                                            {failure_analysis.primary_error}
                                        </pre>
                                    </Collapsible>
                                )}
                                
                                {root_cause?.affected_files?.length > 0 && (
                                    <Collapsible title="Affected Files" icon="fas fa-folder-open" badge={root_cause.affected_files.length}>
                                        <div className="flex flex-wrap gap-2">
                                            {root_cause.affected_files.map((file, i) => (
                                                <code key={i} className="px-2 py-1 bg-gray-700 rounded text-sm text-blue-300">{file}</code>
                                            ))}
                                        </div>
                                    </Collapsible>
                                )}
                                
                                {groovy_analysis && groovy_analysis.failure_type !== 'unknown' && (
                                    <Collapsible title="Groovy Analysis" icon="fab fa-java">
                                        <div className="space-y-2 text-sm">
                                            <p><span className="text-gray-400">Type:</span> <span className="text-orange-300">{groovy_analysis.failure_type}</span></p>
                                            {groovy_analysis.root_cause_function && (
                                                <p><span className="text-gray-400">Function:</span> <code className="text-purple-300">{groovy_analysis.root_cause_function}</code></p>
                                            )}
                                            {groovy_analysis.library_name && (
                                                <p><span className="text-gray-400">Library:</span> <code className="text-blue-300">{groovy_analysis.library_name}</code></p>
                                            )}
                                        </div>
                                    </Collapsible>
                                )}
                                
                                {config_analysis && config_analysis.primary_issue !== 'unknown' && (
                                    <Collapsible title="Configuration Analysis" icon="fas fa-cog">
                                        <div className="space-y-2 text-sm">
                                            <p><span className="text-gray-400">Issue:</span> <span className="text-yellow-300">{config_analysis.primary_issue}</span></p>
                                            {config_analysis.credential_issues?.length > 0 && (
                                                <div className="mt-2">
                                                    <span className="text-gray-400">Credentials:</span>
                                                    <div className="flex flex-wrap gap-2 mt-1">
                                                        {config_analysis.credential_issues.map((c, i) => (
                                                            <span key={i} className="px-2 py-1 bg-red-500/20 text-red-300 rounded text-xs">{c.id}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </Collapsible>
                                )}
                                
                                {/* Shell Commands Executed */}
                                {failure_analysis?.tool_invocations?.length > 0 && (
                                    <Collapsible title="Shell Commands Executed" icon="fas fa-terminal" badge={failure_analysis.tool_invocations.length}>
                                        <div className="space-y-3">
                                            {failure_analysis.tool_invocations.map((tool, i) => (
                                                <div key={i} className={`p-3 rounded-lg border ${
                                                    tool.exit_code && tool.exit_code !== 0 
                                                        ? 'bg-red-500/10 border-red-500/30' 
                                                        : 'bg-gray-700/50 border-gray-600'
                                                }`}>
                                                    <div className="flex items-center justify-between mb-2">
                                                        <span className="font-mono text-sm font-semibold text-orange-300">{tool.tool_name}</span>
                                                        {tool.exit_code !== null && tool.exit_code !== undefined && (
                                                            <span className={`text-xs px-2 py-0.5 rounded ${
                                                                tool.exit_code === 0 ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'
                                                            }`}>
                                                                exit: {tool.exit_code}
                                                            </span>
                                                        )}
                                                    </div>
                                                    <code className="block text-xs bg-gray-900 p-2 rounded text-gray-300 break-all">
                                                        {tool.command_line}
                                                    </code>
                                                    {tool.output_lines?.length > 0 && (
                                                        <pre className="mt-2 text-xs bg-gray-900 p-2 rounded text-gray-400 max-h-24 overflow-auto">
                                                            {tool.output_lines.slice(0, 5).join('\n')}
                                                            {tool.output_lines.length > 5 && `\n... (${tool.output_lines.length - 5} more lines)`}
                                                        </pre>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </Collapsible>
                                )}
                                
                                {/* Raw JSON Toggle */}
                                <div className="pt-4 border-t border-gray-700">
                                    <button onClick={() => setShowRawJson(!showRawJson)}
                                        className="text-sm text-gray-500 hover:text-gray-300 flex items-center gap-2">
                                        <i className={`fas fa-code`}></i>
                                        {showRawJson ? 'Hide' : 'Show'} Raw JSON
                                    </button>
                                    {showRawJson && (
                                        <pre className="mt-3 p-4 bg-gray-900 rounded-lg overflow-x-auto text-xs text-gray-400 max-h-96">
                                            {JSON.stringify(result, null, 2)}
                                        </pre>
                                    )}
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'actions' && (
                            <div className="space-y-4">
                                <h4 className="font-medium text-gray-300">Actions Performed</h4>
                                <div className="grid gap-3">
                                    <div className={`p-3 rounded-lg flex items-center gap-3 ${jenkins_description_updated ? 'bg-green-500/10 border border-green-500/30' : 'bg-gray-700/30'}`}>
                                        <i className={`fas ${jenkins_description_updated ? 'fa-check-circle text-green-400' : 'fa-circle text-gray-500'}`}></i>
                                        <div>
                                            <p className="font-medium">Jenkins Build Description</p>
                                            <p className="text-sm text-gray-400">{jenkins_description_updated ? 'Updated with analysis summary' : 'Not updated'}</p>
                                        </div>
                                    </div>
                                    <div className={`p-3 rounded-lg flex items-center gap-3 ${pr_comment_posted ? 'bg-green-500/10 border border-green-500/30' : 'bg-gray-700/30'}`}>
                                        <i className={`fas ${pr_comment_posted ? 'fa-check-circle text-green-400' : 'fa-circle text-gray-500'}`}></i>
                                        <div>
                                            <p className="font-medium">PR/MR Comment</p>
                                            <p className="text-sm text-gray-400">{pr_comment_posted ? 'Analysis posted to PR' : 'No PR URL provided or posting disabled'}</p>
                                        </div>
                                    </div>
                                </div>
                                
                                {libraries_fetched?.length > 0 && (
                                    <div className="mt-4">
                                        <h4 className="font-medium text-gray-300 mb-2">Libraries Analyzed</h4>
                                        <div className="flex flex-wrap gap-2">
                                            {libraries_fetched.map((lib, i) => (
                                                <span key={i} className="px-2 py-1 bg-blue-500/20 text-blue-300 rounded text-sm">{lib}</span>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                
                                {/* Copy Actions */}
                                <div className="mt-6 pt-4 border-t border-gray-700">
                                    <h4 className="font-medium text-gray-300 mb-3">Quick Actions</h4>
                                    <div className="flex flex-wrap gap-2">
                                        <Button variant="secondary" size="sm" onClick={() => navigator.clipboard.writeText(root_cause?.summary || '')}>
                                            <i className="fas fa-copy"></i> Copy Root Cause
                                        </Button>
                                        <Button variant="secondary" size="sm" onClick={() => navigator.clipboard.writeText(JSON.stringify(result, null, 2))}>
                                            <i className="fas fa-code"></i> Copy JSON
                                        </Button>
                                        {build_info?.url && (
                                            <Button variant="secondary" size="sm" onClick={() => window.open(build_info.url, '_blank')}>
                                                <i className="fab fa-jenkins"></i> View Build
                                            </Button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </Card>
            );
        }

        // =====================================================================
        // History Panel
        // =====================================================================
        
        function HistoryPanel({ history, onSelect, onClear }) {
            if (!history || history.length === 0) {
                return (
                    <Card className="p-4">
                        <h3 className="text-lg font-semibold mb-3 flex items-center gap-2">
                            <i className="fas fa-history text-gray-400"></i> Recent Analyses
                        </h3>
                        <p className="text-gray-500 text-sm">No analyses yet. Run your first analysis above.</p>
                    </Card>
                );
            }
            
            return (
                <Card className="p-4">
                    <div className="flex items-center justify-between mb-3">
                        <h3 className="text-lg font-semibold flex items-center gap-2">
                            <i className="fas fa-history text-gray-400"></i> Recent ({history.length})
                        </h3>
                        <button onClick={onClear} className="text-xs text-gray-500 hover:text-red-400 transition-colors">
                            <i className="fas fa-trash mr-1"></i> Clear
                        </button>
                    </div>
                    <div className="space-y-2 max-h-80 overflow-y-auto scrollbar-thin">
                        {history.map((item, i) => (
                            <div key={i} onClick={() => onSelect(item)}
                                className="p-3 rounded-lg bg-gray-700/50 hover:bg-gray-700 cursor-pointer transition-colors">
                                <div className="flex items-center justify-between mb-1">
                                    <span className="font-medium truncate text-sm max-w-[150px]">{item.build_info?.job}</span>
                                    <span className="text-xs text-gray-500">#{item.build_info?.build_number}</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className="text-xs px-2 py-0.5 rounded bg-gray-600 truncate max-w-[100px]">
                                        {item.failure_analysis?.category?.replace(/_/g, ' ')}
                                    </span>
                                    <ModeBadge mode={item.analysis_mode || 'scripted'} />
                                </div>
                            </div>
                        ))}
                    </div>
                </Card>
            );
        }

        // =====================================================================
        // Main App
        // =====================================================================
        
        function App() {
            const [health, setHealth] = useState({ agent: 'loading', ai: 'loading', jenkins: 'loading', github: 'unknown', scm: 'unknown' });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [result, setResult] = useState(null);
            const [history, setHistory] = useState(() => {
                try { return JSON.parse(localStorage.getItem('analysisHistory') || '[]'); }
                catch { return []; }
            });
            
            useEffect(() => {
                checkHealth();
                const interval = setInterval(checkHealth, 30000);
                return () => clearInterval(interval);
            }, []);
            
            useEffect(() => {
                localStorage.setItem('analysisHistory', JSON.stringify(history.slice(0, 20)));
            }, [history]);
            
            const checkHealth = async () => {
                try {
                    const res = await fetch(`${API_BASE}/health`);
                    if (res.ok) {
                        const data = await res.json();
                        setHealth({
                            agent: 'healthy',
                            ai: data.ai_connected ? 'healthy' : 'unhealthy',
                            jenkins: data.jenkins_connected ? 'healthy' : 'unhealthy',
                            github: data.github_connected ? 'healthy' : 'unknown',
                            scm: data.scm_connected ? 'healthy' : 'unknown',
                        });
                    } else {
                        setHealth({ agent: 'unhealthy', ai: 'unknown', jenkins: 'unknown', github: 'unknown', scm: 'unknown' });
                    }
                } catch (e) {
                    setHealth({ agent: 'unhealthy', ai: 'unknown', jenkins: 'unknown', github: 'unknown', scm: 'unknown' });
                }
            };
            
            const handleAnalyze = async (payload) => {
                setLoading(true);
                setError(null);
                
                try {
                    const res = await fetch(`${API_BASE}/analyze`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!res.ok) {
                        const errData = await res.json().catch(() => ({}));
                        throw new Error(errData.detail || `Analysis failed: ${res.status}`);
                    }
                    
                    const data = await res.json();
                    setResult(data);
                    setHistory(prev => [data, ...prev.filter(h => 
                        !(h.build_info?.job === data.build_info?.job && h.build_info?.build_number === data.build_info?.build_number)
                    ).slice(0, 19)]);
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };
            
            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="bg-gray-800 border-b border-gray-700 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center">
                                        <i className="fas fa-robot text-white text-xl"></i>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold gradient-text">Jenkins Failure Analysis</h1>
                                        <p className="text-xs text-gray-500">AI-Powered Build Debugging • Hybrid Architecture v1.4</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <a href={`${API_BASE}/docs`} target="_blank" className="text-gray-400 hover:text-white transition-colors" title="API Docs">
                                        <i className="fas fa-book"></i>
                                    </a>
                                    <a href="https://github.com" target="_blank" className="text-gray-400 hover:text-white transition-colors">
                                        <i className="fab fa-github text-xl"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </header>
                    
                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 py-6">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Left Sidebar */}
                            <div className="space-y-6">
                                <HealthPanel health={health} />
                                <JenkinsSettings />
                                <AnalysisForm onSubmit={handleAnalyze} loading={loading} />
                                <HistoryPanel history={history} onSelect={setResult} onClear={() => setHistory([])} />
                            </div>
                            
                            {/* Main Content Area */}
                            <div className="lg:col-span-2 space-y-6">
                                {/* Error */}
                                {error && (
                                    <Card className="p-4 border-red-500/50 bg-red-500/10 fade-in">
                                        <div className="flex items-start gap-3">
                                            <i className="fas fa-exclamation-circle text-red-400 mt-1"></i>
                                            <div className="flex-1">
                                                <h4 className="font-medium text-red-300">Analysis Failed</h4>
                                                <p className="text-sm text-gray-300 mt-1">{error}</p>
                                            </div>
                                            <button onClick={() => setError(null)} className="text-gray-500 hover:text-gray-300">
                                                <i className="fas fa-times"></i>
                                            </button>
                                        </div>
                                    </Card>
                                )}
                                
                                {/* Loading */}
                                {loading && (
                                    <Card className="p-8 fade-in">
                                        <div className="text-center">
                                            <div className="w-16 h-16 mx-auto mb-4 relative">
                                                <i className="fas fa-cog text-4xl text-indigo-500 spin-slow"></i>
                                            </div>
                                            <h3 className="text-xl font-semibold mb-2">Analyzing Build...</h3>
                                            <p className="text-gray-400 text-sm">
                                                Processing logs and running AI analysis...
                                            </p>
                                        </div>
                                    </Card>
                                )}
                                
                                {/* Results */}
                                {!loading && result && <AnalysisResult result={result} />}
                                
                                {/* Empty State */}
                                {!loading && !result && !error && (
                                    <Card className="p-12">
                                        <div className="text-center">
                                            <i className="fas fa-search text-6xl text-gray-600 mb-4"></i>
                                            <h3 className="text-xl font-semibold text-gray-400 mb-2">Ready to Analyze</h3>
                                            <p className="text-gray-500 max-w-md mx-auto mb-6">
                                                Enter a Jenkins job name and build number to start analyzing failures.
                                            </p>
                                            <div className="flex justify-center gap-4 text-sm">
                                                <div className="flex items-center gap-2 text-gray-500">
                                                    <span className="w-2 h-2 bg-gray-500 rounded-full"></span>
                                                    <span>⚡ Fast: Simple errors</span>
                                                </div>
                                                <div className="flex items-center gap-2 text-purple-400">
                                                    <span className="w-2 h-2 bg-purple-500 rounded-full"></span>
                                                    <span>🔍 Deep: Library issues</span>
                                                </div>
                                            </div>
                                        </div>
                                    </Card>
                                )}
