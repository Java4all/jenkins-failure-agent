<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins Failure Analysis Agent</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        jenkins: { red: '#D33833', blue: '#335061', dark: '#1a1a2e', darker: '#16162a' }
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.5); } 50% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.8); } }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .status-healthy { animation: pulse-glow 2s infinite; }
        .spin-slow { animation: spin-slow 2s linear infinite; }
        .fade-in { animation: fade-in 0.3s ease-out; }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #1f2937; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        
        const API_BASE = window.location.port === '3000' 
            ? 'http://localhost:8080' 
            : `${window.location.protocol}//${window.location.hostname}:8080`;
        
        // =====================================================================
        // Base Components
        // =====================================================================
        
        function StatusBadge({ status, size = 'md' }) {
            const colors = { healthy: 'bg-green-500', unhealthy: 'bg-red-500', loading: 'bg-yellow-500', unknown: 'bg-gray-500' };
            const sizes = { sm: 'w-2 h-2', md: 'w-3 h-3', lg: 'w-4 h-4' };
            return <span className={`inline-block rounded-full ${colors[status] || colors.unknown} ${sizes[size]} ${status === 'healthy' ? 'status-healthy' : ''}`}></span>;
        }
        
        function Card({ children, className = '' }) {
            return <div className={`bg-gray-800 rounded-xl shadow-lg border border-gray-700 ${className}`}>{children}</div>;
        }
        
        function Button({ children, onClick, disabled, loading, className = '', variant = 'primary', size = 'md', type = 'button' }) {
            const variants = {
                primary: 'bg-indigo-600 hover:bg-indigo-700 text-white',
                secondary: 'bg-gray-700 hover:bg-gray-600 text-white',
                danger: 'bg-red-600 hover:bg-red-700 text-white',
                ghost: 'bg-transparent hover:bg-gray-700 text-gray-300',
                success: 'bg-green-600 hover:bg-green-700 text-white',
            };
            const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2', lg: 'px-6 py-3 text-lg' };
            return (
                <button type={type} onClick={onClick} disabled={disabled || loading}
                    className={`rounded-lg font-medium transition-all duration-200 flex items-center justify-center gap-2
                        ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}>
                    {loading && <i className="fas fa-spinner fa-spin"></i>}
                    {children}
                </button>
            );
        }
        
        function Input({ label, value, onChange, placeholder, type = 'text', className = '', disabled = false, helpText = '' }) {
            return (
                <div className={className}>
                    {label && <label className="block text-sm font-medium text-gray-400 mb-1">{label}</label>}
                    <input type={type} value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} disabled={disabled}
                        className="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent placeholder-gray-500 disabled:opacity-50" />
                    {helpText && <p className="text-xs text-gray-500 mt-1">{helpText}</p>}
                </div>
            );
        }
        
        function Checkbox({ label, checked, onChange, description = '' }) {
            return (
                <label className="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" checked={checked} onChange={(e) => onChange(e.target.checked)}
                        className="w-4 h-4 mt-0.5 rounded border-gray-600 text-indigo-500 focus:ring-indigo-500 bg-gray-700" />
                    <div>
                        <span className="text-sm font-medium text-gray-300">{label}</span>
                        {description && <p className="text-xs text-gray-500">{description}</p>}
                    </div>
                </label>
            );
        }
        
        function Tabs({ tabs, activeTab, onChange }) {
            return (
                <div className="flex border-b border-gray-700 overflow-x-auto">
                    {tabs.map((tab) => (
                        <button key={tab.id} onClick={() => onChange(tab.id)}
                            className={`px-4 py-2 text-sm font-medium transition-colors relative whitespace-nowrap
                                ${activeTab === tab.id ? 'text-indigo-400' : 'text-gray-400 hover:text-gray-200'}`}>
                            {tab.icon && <i className={`${tab.icon} mr-2`}></i>}
                            {tab.label}
                            {tab.badge && <span className="ml-2 px-1.5 py-0.5 text-xs rounded-full bg-indigo-600">{tab.badge}</span>}
                            {activeTab === tab.id && <div className="absolute bottom-0 left-0 right-0 h-0.5 bg-indigo-500"></div>}
                        </button>
                    ))}
                </div>
            );
        }
        
        function Collapsible({ title, icon, children, defaultOpen = false, badge = null }) {
            const [isOpen, setIsOpen] = useState(defaultOpen);
            return (
                <div className="border border-gray-700 rounded-lg overflow-hidden">
                    <button onClick={() => setIsOpen(!isOpen)}
                        className="w-full px-4 py-3 flex items-center justify-between bg-gray-800 hover:bg-gray-750 transition-colors">
                        <div className="flex items-center gap-2">
                            {icon && <i className={`${icon} text-gray-400`}></i>}
                            <span className="font-medium">{title}</span>
                            {badge && <span className="px-2 py-0.5 text-xs rounded-full bg-gray-700">{badge}</span>}
                        </div>
                        <i className={`fas fa-chevron-${isOpen ? 'up' : 'down'} text-gray-500`}></i>
                    </button>
                    {isOpen && <div className="p-4 bg-gray-800/50">{children}</div>}
                </div>
            );
        }
        
        function Modal({ isOpen, onClose, title, children }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60" onClick={onClose}>
                    <div className="bg-gray-800 rounded-xl shadow-2xl max-w-2xl w-full max-h-[80vh] overflow-hidden fade-in" onClick={(e) => e.stopPropagation()}>
                        <div className="flex items-center justify-between px-6 py-4 border-b border-gray-700">
                            <h3 className="text-lg font-semibold">{title}</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-white"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="p-6 overflow-y-auto max-h-[60vh]">{children}</div>
                    </div>
                </div>
            );
        }

        // =====================================================================
        // Source Registry Component (Requirement 10.7)
        // =====================================================================
        
        function SourceRegistry({ apiBase }) {
            const [sources, setSources] = useState([]);
            const [loading, setLoading] = useState(false);
            const [showForm, setShowForm] = useState(false);
            const [newSource, setNewSource] = useState({ type: 'repo', value: '', name: '', ref: 'main' });
            
            const fetchSources = async () => {
                try {
                    const res = await fetch(`${apiBase}/sources`);
                    if (res.ok) {
                        const data = await res.json();
                        setSources(data.sources || []);
                    }
                } catch (e) {
                    console.error('Failed to fetch sources:', e);
                }
            };
            
            useEffect(() => { fetchSources(); }, []);
            
            const addSource = async () => {
                if (!newSource.value) return;
                setLoading(true);
                try {
                    const res = await fetch(`${apiBase}/sources`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newSource)
                    });
                    if (res.ok) {
                        await fetchSources();
                        setNewSource({ type: 'repo', value: '', name: '', ref: 'main' });
                        setShowForm(false);
                    }
                } catch (e) {
                    console.error('Failed to add source:', e);
                }
                setLoading(false);
            };
            
            const deleteSource = async (index) => {
                try {
                    const res = await fetch(`${apiBase}/sources/${index}`, { method: 'DELETE' });
                    if (res.ok) await fetchSources();
                } catch (e) {
                    console.error('Failed to delete source:', e);
                }
            };
            
            return (
                <div className="mt-3">
                    <div className="flex items-center justify-between mb-2">
                        <h4 className="text-sm font-medium text-gray-300 flex items-center gap-2">
                            <i className="fas fa-folder-tree text-gray-400"></i> Source Registry
                            <span className="text-xs text-gray-500">({sources.length})</span>
                        </h4>
                        <button onClick={() => setShowForm(!showForm)} 
                            className="text-xs text-indigo-400 hover:text-indigo-300">
                            <i className={`fas fa-${showForm ? 'minus' : 'plus'} mr-1`}></i>
                            {showForm ? 'Cancel' : 'Add Source'}
                        </button>
                    </div>
                    
                    {showForm && (
                        <div className="p-3 bg-gray-700/50 rounded-lg mb-2 space-y-2">
                            <div className="grid grid-cols-3 gap-2">
                                <select value={newSource.type} onChange={e => setNewSource({...newSource, type: e.target.value})}
                                    className="bg-gray-700 text-white text-sm rounded px-2 py-1.5 border border-gray-600">
                                    <option value="repo">GitHub Repo</option>
                                    <option value="local_path">Local Path</option>
                                </select>
                                <input value={newSource.value} onChange={e => setNewSource({...newSource, value: e.target.value})}
                                    placeholder={newSource.type === 'repo' ? 'org/repo' : '/path/to/lib'}
                                    className="bg-gray-700 text-white text-sm rounded px-2 py-1.5 border border-gray-600 col-span-2" />
                            </div>
                            <div className="grid grid-cols-3 gap-2">
                                <input value={newSource.name} onChange={e => setNewSource({...newSource, name: e.target.value})}
                                    placeholder="Label (optional)" className="bg-gray-700 text-white text-sm rounded px-2 py-1.5 border border-gray-600" />
                                <input value={newSource.ref} onChange={e => setNewSource({...newSource, ref: e.target.value})}
                                    placeholder="Ref (main)" className="bg-gray-700 text-white text-sm rounded px-2 py-1.5 border border-gray-600"
                                    disabled={newSource.type !== 'repo'} />
                                <button onClick={addSource} disabled={loading || !newSource.value}
                                    className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white text-sm rounded px-3 py-1.5">
                                    {loading ? 'Adding...' : 'Add'}
                                </button>
                            </div>
                        </div>
                    )}
                    
                    {sources.length > 0 ? (
                        <div className="space-y-1 max-h-32 overflow-y-auto">
                            {sources.map((src) => (
                                <div key={src.index} className="flex items-center justify-between p-2 bg-gray-700/30 rounded text-xs">
                                    <div className="flex items-center gap-2 min-w-0">
                                        <i className={`fas fa-${src.type === 'repo' ? 'github fab' : 'folder'} text-gray-500`}></i>
                                        <span className="truncate text-gray-300" title={src.value}>{src.name || src.value}</span>
                                        {src.type === 'repo' && src.ref && <span className="text-gray-500">@{src.ref}</span>}
                                    </div>
                                    <button onClick={() => deleteSource(src.index)} className="text-red-400 hover:text-red-300 ml-2">
                                        <i className="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <p className="text-xs text-gray-500 italic">No sources configured. Add repos or paths for source code lookup.</p>
                    )}
                </div>
            );
        }

        // =====================================================================
        // Health Panel - Extended
        // =====================================================================
        
        function HealthPanel({ health }) {
            const services = [
                { key: 'agent', label: 'Agent', icon: 'fas fa-robot' },
                { key: 'jenkins', label: 'Jenkins', icon: 'fab fa-jenkins' },
                { key: 'ai', label: 'AI Model', icon: 'fas fa-brain' },
                { key: 'github', label: 'GitHub', icon: 'fab fa-github' },
                { key: 'scm', label: 'SCM (PR)', icon: 'fas fa-code-branch' },
            ];
            
            return (
                <Card className="p-4">
                    <h3 className="text-lg font-semibold mb-3 flex items-center gap-2">
                        <i className="fas fa-heartbeat text-red-400"></i>
                        System Health
                    </h3>
                    <div className="grid grid-cols-2 gap-2">
                        {services.map(({ key, label, icon }) => (
                            <div key={key} className="flex items-center justify-between p-2 bg-gray-700/50 rounded-lg">
                                <div className="flex items-center gap-2">
                                    <i className={`${icon} text-gray-400 text-sm w-4`}></i>
                                    <span className="text-sm text-gray-300">{label}</span>
                                </div>
                                <StatusBadge status={health[key] || 'unknown'} size="sm" />
                            </div>
                        ))}
                    </div>
                </Card>
            );
        }

        // =====================================================================
        // Jenkins Settings Panel
        // =====================================================================
        
        function JenkinsSettings() {
            const [expanded, setExpanded] = useState(false);
            const [loading, setLoading] = useState(false);
            const [saving, setSaving] = useState(false);
            const [config, setConfig] = useState({ url: '', username: '', has_token: false });
            const [form, setForm] = useState({ url: '', username: '', api_token: '' });
            const [message, setMessage] = useState({ text: '', type: '' });
            
            useEffect(() => {
                if (expanded) fetchConfig();
            }, [expanded]);
            
            const fetchConfig = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/config/jenkins`);
                    if (res.ok) {
                        const data = await res.json();
                        setConfig(data);
                        setForm({ url: data.url || '', username: data.username || '', api_token: '' });
                    }
                } catch (e) {
                    console.error('Failed to fetch Jenkins config:', e);
                }
                setLoading(false);
            };
            
            const handleSave = async () => {
                setSaving(true);
                setMessage({ text: '', type: '' });
                
                try {
                    const payload = {};
                    if (form.url && form.url !== config.url) payload.url = form.url;
                    if (form.username && form.username !== config.username) payload.username = form.username;
                    if (form.api_token) payload.api_token = form.api_token;
                    
                    if (Object.keys(payload).length === 0) {
                        setMessage({ text: 'No changes to save', type: 'info' });
                        setSaving(false);
                        return;
                    }
                    
                    const res = await fetch(`${API_BASE}/config/jenkins`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await res.json();
                    
                    if (data.success) {
                        setConfig(data);
                        setForm({ ...form, api_token: '' });
                        setMessage({ text: data.message, type: 'success' });
                    } else {
                        setMessage({ text: data.message || 'Update failed', type: 'error' });
                    }
                } catch (e) {
                    setMessage({ text: 'Failed to update configuration', type: 'error' });
                }
                setSaving(false);
            };
            
            return (
                <Card className="p-4">
                    <button onClick={() => setExpanded(!expanded)}
                        className="w-full flex items-center justify-between text-left">
                        <h3 className="text-lg font-semibold flex items-center gap-2">
                            <i className="fab fa-jenkins text-red-400"></i>
                            Jenkins Settings
                        </h3>
                        <i className={`fas fa-chevron-${expanded ? 'up' : 'down'} text-gray-500`}></i>
                    </button>
                    
                    {expanded && (
                        <div className="mt-4 space-y-3 fade-in">
                            {loading ? (
                                <div className="text-center py-4">
                                    <i className="fas fa-spinner fa-spin text-gray-500"></i>
                                </div>
                            ) : (
                                <>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">Jenkins URL</label>
                                        <input type="text" value={form.url} onChange={(e) => setForm({...form, url: e.target.value})}
                                            placeholder="https://jenkins.example.com"
                                            className="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">Username</label>
                                        <input type="text" value={form.username} onChange={(e) => setForm({...form, username: e.target.value})}
                                            placeholder="jenkins-user"
                                            className="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">
                                            API Token {config.has_token && <span className="text-green-400 text-xs">(configured)</span>}
                                        </label>
                                        <input type="password" value={form.api_token} onChange={(e) => setForm({...form, api_token: e.target.value})}
                                            placeholder={config.has_token ? "••••••••" : "Enter API token"}
                                            className="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                        <p className="text-xs text-gray-500 mt-1">Leave empty to keep current token</p>
                                    </div>
                                    
                                    {message.text && (
                                        <div className={`p-2 rounded text-sm ${
                                            message.type === 'success' ? 'bg-green-500/20 text-green-300' :
                                            message.type === 'error' ? 'bg-red-500/20 text-red-300' :
                                            'bg-gray-600/50 text-gray-300'
                                        }`}>
                                            <i className={`fas fa-${message.type === 'success' ? 'check' : message.type === 'error' ? 'times' : 'info'}-circle mr-2`}></i>
                                            {message.text}
                                        </div>
                                    )}
                                    
                                    <Button onClick={handleSave} loading={saving} className="w-full" size="sm">
                                        <i className="fas fa-save mr-2"></i> Save Settings
                                    </Button>
                                </>
                            )}
                        </div>
                    )}
                </Card>
            );
        }

        // =====================================================================
        // Full-Featured Analysis Form
        // =====================================================================
        
        function AnalysisForm({ onSubmit, loading }) {
            const [job, setJob] = useState('');
            const [build, setBuild] = useState('');
            const [latestFailed, setLatestFailed] = useState(false);
            const [showAdvanced, setShowAdvanced] = useState(false);
            
            // Analysis mode: 'iterative' (default) or 'deep' (Req 5.10)
            const [analysisMode, setAnalysisMode] = useState('iterative');
            
            // User hint for focused analysis (Req 18.3)
            const [userHint, setUserHint] = useState('');
            
            // Source code options
            const [projectRepo, setProjectRepo] = useState('');
            const [projectRef, setProjectRef] = useState('');
            
            // PR integration
            const [prUrl, setPrUrl] = useState('');
            const [prSha, setPrSha] = useState('');
            
            // Reporting options
            const [updateJenkinsDesc, setUpdateJenkinsDesc] = useState(true);
            const [postToPr, setPostToPr] = useState(true);
            const [notifySlack, setNotifySlack] = useState(false);
            
            const handleSubmit = (e) => {
                e.preventDefault();
                if (!job) return;
                
                const payload = {
                    job,
                    latest_failed: latestFailed,
                    mode: analysisMode,  // Req 5.9: single mode field
                    user_hint: userHint || null,  // Req 18.3: user hint
                    update_jenkins_description: updateJenkinsDesc,
                    post_to_pr: postToPr,
                    notify_slack: notifySlack,
                };
                
                if (!latestFailed && build) payload.build = parseInt(build);
                if (projectRepo) payload.project_repo = projectRepo;
                if (projectRef) payload.project_ref = projectRef;
                if (prUrl) payload.pr_url = prUrl;
                if (prSha) payload.pr_sha = prSha;
                
                onSubmit(payload);
            };
            
            return (
                <Card className="p-6">
                    <h3 className="text-xl font-semibold mb-4 flex items-center gap-2">
                        <i className="fas fa-search text-indigo-400"></i>
                        Analyze Build Failure
                    </h3>
                    
                    <form onSubmit={handleSubmit} className="space-y-4">
                        {/* Basic Fields */}
                        <Input label="Job Name" value={job} onChange={setJob} placeholder="e.g., my-project/main" />
                        
                        <div className="flex items-end gap-3">
                            <Input label="Build Number" value={build} onChange={setBuild} placeholder="123" 
                                type="number" disabled={latestFailed} className="flex-1" />
                            <div className="pb-2">
                                <Checkbox label="Latest Failed" checked={latestFailed} onChange={setLatestFailed} />
                            </div>
                        </div>
                        
                        {/* Analysis Mode Selection - Simplified to 2 options (Req 5.10) */}
                        <div className="space-y-2">
                            <label className="text-sm font-medium text-gray-300">Analysis Mode</label>
                            
                            {/* Iterative Mode (Default) */}
                            <div className={`p-3 rounded-lg border transition-all cursor-pointer
                                ${analysisMode === 'iterative' ? 'bg-green-500/10 border-green-500/50' : 'bg-gray-700/30 border-gray-600'}`}
                                onClick={() => setAnalysisMode('iterative')}>
                                <div className="flex items-start gap-3">
                                    <input type="radio" checked={analysisMode === 'iterative'} onChange={() => {}}
                                        className="w-4 h-4 mt-0.5 text-green-500 focus:ring-green-500 bg-gray-700" />
                                    <div>
                                        <span className="text-sm font-medium text-green-300">🔄 Iterative (Default)</span>
                                        <p className="text-xs text-gray-400 mt-0.5">
                                            Multi-call AI analysis with automatic source code pre-loading. Recommended for most cases.
                                        </p>
                                        {analysisMode === 'iterative' && (
                                            <div className="mt-2 flex flex-wrap gap-1">
                                                {['RC Finder', 'Code Lookup', 'Few-Shot Learning'].map(t => (
                                                    <span key={t} className="px-2 py-0.5 bg-green-500/20 text-green-300 rounded text-xs">{t}</span>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                            
                            {/* Deep Mode */}
                            <div className={`p-3 rounded-lg border transition-all cursor-pointer
                                ${analysisMode === 'deep' ? 'bg-purple-500/10 border-purple-500/50' : 'bg-gray-700/30 border-gray-600'}`}
                                onClick={() => setAnalysisMode('deep')}>
                                <div className="flex items-start gap-3">
                                    <input type="radio" checked={analysisMode === 'deep'} onChange={() => {}}
                                        className="w-4 h-4 mt-0.5 text-purple-500 focus:ring-purple-500 bg-gray-700" />
                                    <div>
                                        <span className="text-sm font-medium text-purple-300">🔍 Deep Investigation</span>
                                        <p className="text-xs text-gray-400 mt-0.5">
                                            Full MCP tool agent for complex library/code issues. 5-15 tool calls.
                                        </p>
                                        {analysisMode === 'deep' && (
                                            <div className="mt-2 flex flex-wrap gap-1">
                                                {['get_library_file', 'search_code', 'get_blame'].map(t => (

        }

        // =====================================================================
        // Result Badges & Components
        // =====================================================================
        
        function CategoryBadge({ category }) {
            const colors = {
                'GROOVY_LIBRARY': 'bg-purple-500/20 text-purple-300 border-purple-500/50',
                'GROOVY_CPS': 'bg-purple-500/20 text-purple-300 border-purple-500/50',
                'GROOVY_SANDBOX': 'bg-orange-500/20 text-orange-300 border-orange-500/50',
                'GROOVY_SERIALIZATION': 'bg-purple-500/20 text-purple-300 border-purple-500/50',
                'CREDENTIAL_ERROR': 'bg-red-500/20 text-red-300 border-red-500/50',
                'AGENT_ERROR': 'bg-yellow-500/20 text-yellow-300 border-yellow-500/50',
                'PLUGIN_ERROR': 'bg-blue-500/20 text-blue-300 border-blue-500/50',
                'TEST_FAILURE': 'bg-red-500/20 text-red-300 border-red-500/50',
                'COMPILATION_ERROR': 'bg-red-500/20 text-red-300 border-red-500/50',
                'CONFIGURATION': 'bg-yellow-500/20 text-yellow-300 border-yellow-500/50',
                'INFRASTRUCTURE': 'bg-gray-500/20 text-gray-300 border-gray-500/50',
                'NETWORK': 'bg-blue-500/20 text-blue-300 border-blue-500/50',
                'TIMEOUT': 'bg-orange-500/20 text-orange-300 border-orange-500/50',
                'DEPENDENCY': 'bg-cyan-500/20 text-cyan-300 border-cyan-500/50',
                'RESOURCE': 'bg-pink-500/20 text-pink-300 border-pink-500/50',
            };
            const color = colors[category] || 'bg-gray-500/20 text-gray-300 border-gray-500/50';
            return <span className={`px-3 py-1 rounded-full text-sm font-medium border ${color}`}>{category?.replace(/_/g, ' ')}</span>;
        }
        
        function TierBadge({ tier }) {
            const tierInfo = {
                'configuration': { emoji: '⚙️', label: 'Configuration', color: 'bg-orange-500/20 text-orange-300 border-orange-500/50', desc: 'End-user config issue' },
                'pipeline_misuse': { emoji: '🔧', label: 'Pipeline/Code', color: 'bg-red-500/20 text-red-300 border-red-500/50', desc: 'Jenkinsfile or library issue' },
                'external_system': { emoji: '🌐', label: 'External', color: 'bg-blue-500/20 text-blue-300 border-blue-500/50', desc: 'Network, deps, or infra' },
                'unknown': { emoji: '❓', label: 'Unknown', color: 'bg-gray-500/20 text-gray-300 border-gray-500/50', desc: 'Needs investigation' },
            };
            const info = tierInfo[tier] || tierInfo.unknown;
            return (
                <span className={`px-3 py-1 rounded-full text-sm font-medium border ${info.color}`} title={info.desc}>
                    {info.emoji} {info.label}
                </span>
            );
        }
        
        function ModeBadge({ mode, toolCalls, iterations }) {
            // Handle mode string (Req 5.10: only iterative and deep)
            const baseMode = mode?.split(' ')[0] || 'iterative';
            
            const modeInfo = {
                'iterative': { emoji: '🔄', label: 'Iterative', color: 'bg-green-600/50 text-green-300', desc: 'Multi-call RC analysis' },
                'deep': { emoji: '🔍', label: 'Deep', color: 'bg-purple-600/50 text-purple-300', desc: 'MCP tool investigation' },
            };
            const info = modeInfo[baseMode] || modeInfo.iterative;
            return (
                <div className="flex items-center gap-2" title={info.desc}>
                    <span className={`px-2 py-1 rounded text-xs font-medium ${info.color}`}>{info.emoji} {info.label}</span>
                    {iterations > 1 && baseMode === 'iterative' && (
                        <span className="text-xs text-green-400 flex items-center gap-1">
                            <i className="fas fa-sync-alt"></i> {iterations} calls
                        </span>
                    )}
                    {toolCalls > 0 && baseMode === 'deep' && (
                        <span className="text-xs text-purple-400 flex items-center gap-1">
                            <i className="fas fa-tools"></i> {toolCalls} tools
                        </span>
                    )}
                </div>
            );
        }
        
        function RetryBadge({ assessment }) {
            const [expanded, setExpanded] = React.useState(false);
            
            if (!assessment) return null;
            const { is_retriable, confidence, reason, recommended_wait_seconds, max_retries } = assessment;
            
            const isLong = reason && reason.length > 150;
            const displayReason = isLong && !expanded ? reason.substring(0, 150) + '...' : reason;
            
            return (
                <div className={`p-4 rounded-lg ${is_retriable ? 'bg-green-500/10 border border-green-500/30' : 'bg-red-500/10 border border-red-500/30'}`}>
                    <div className="flex items-center gap-2 mb-2">
                        <span className="text-2xl">{is_retriable ? '🔄' : '⛔'}</span>
                        <span className={`text-lg font-semibold ${is_retriable ? 'text-green-300' : 'text-red-300'}`}>
                            {is_retriable ? 'Safe to Retry' : 'Not Retriable'}
                        </span>
                        <span className="text-sm text-gray-400">({Math.round(confidence * 100)}% confidence)</span>
                    </div>
                    <p className="text-gray-300 text-sm whitespace-pre-wrap">{displayReason}</p>
                    {isLong && (
                        <button 
                            onClick={() => setExpanded(!expanded)}
                            className="mt-2 text-xs text-blue-400 hover:text-blue-300 flex items-center gap-1">
                            <i className={`fas fa-chevron-${expanded ? 'up' : 'down'}`}></i>
                            {expanded ? 'Show less' : 'Show full reason'}
                        </button>
                    )}
                    {is_retriable && (recommended_wait_seconds > 0 || max_retries > 0) && (
                        <div className="mt-2 flex gap-4 text-xs text-gray-400">
                            {recommended_wait_seconds > 0 && <span><i className="fas fa-clock mr-1"></i>Wait {recommended_wait_seconds}s</span>}
                            {max_retries > 0 && <span><i className="fas fa-redo mr-1"></i>Max {max_retries} retries</span>}
                        </div>
                    )}
                </div>
            );
        }
        
        // Expandable Root Cause component
        function ExpandableRootCause({ summary }) {
            const [expanded, setExpanded] = React.useState(false);
            
            if (!summary) return <p className="text-gray-400 italic">No root cause identified</p>;
            
            const isLong = summary.length > 300;
            const displayText = isLong && !expanded ? summary.substring(0, 300) + '...' : summary;
            
            return (
                <div>
                    <p className="text-lg whitespace-pre-wrap">{displayText}</p>
                    {isLong && (
                        <button 
                            onClick={() => setExpanded(!expanded)}
                            className="mt-2 text-sm text-blue-400 hover:text-blue-300 flex items-center gap-1">
                            <i className={`fas fa-chevron-${expanded ? 'up' : 'down'}`}></i>
                            {expanded ? 'Show less' : 'Show full root cause'}
                        </button>
                    )}
                </div>
            );
        }
        
        function ConfidenceMeter({ confidence }) {
            const percent = Math.round(confidence * 100);
            const color = percent >= 80 ? 'bg-green-500' : percent >= 50 ? 'bg-yellow-500' : 'bg-red-500';
            return (
                <div className="flex items-center gap-2">
                    <div className="flex-1 h-2 bg-gray-700 rounded-full overflow-hidden">
                        <div className={`h-full ${color} transition-all`} style={{ width: `${percent}%` }}></div>
                    </div>
                    <span className="text-sm text-gray-400 w-12">{percent}%</span>
                </div>
            );
        }

        // =====================================================================
        // Feedback Panel - User voting on analysis quality
        // =====================================================================
        
        function FeedbackPanel({ result }) {
            const [feedbackState, setFeedbackState] = useState('pending');
            const [showCorrection, setShowCorrection] = useState(false);
            const [correction, setCorrection] = useState({ root_cause: '', fix: '' });
            const [submitting, setSubmitting] = useState(false);
            
            // Reset state when result changes (new analysis)
            const resultKey = result?.build_info?.job_name + '-' + result?.build_info?.build_number;
            React.useEffect(() => {
                setFeedbackState('pending');
                setShowCorrection(false);
                setCorrection({ root_cause: '', fix: '' });
                setSubmitting(false);
            }, [resultKey]);
            
            if (!result) return null;
            
            const { build_info, failure_analysis, root_cause } = result;
            
            const submitFeedback = async (wasCorrect, correctedData = null) => {
                setSubmitting(true);
                try {
                    const payload = {
                        job: build_info?.job_name || '',
                        build: build_info?.build_number || 0,
                        was_correct: wasCorrect,
                        error_category: failure_analysis?.category || root_cause?.category || '',
                        error_snippet: failure_analysis?.primary_error || '',
                        failed_stage: failure_analysis?.failed_stage || '',
                        failed_method: failure_analysis?.failed_method || '',
                        ai_root_cause: root_cause?.summary || '',
                        confirmed_root_cause: correctedData?.root_cause || root_cause?.summary || '',
                        confirmed_fix: correctedData?.fix || root_cause?.fix || '',
                    };
                    
                    console.log('Submitting feedback:', payload);
                    
                    const response = await fetch('/feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                    
                    console.log('Feedback response status:', response.status);
                    
                    if (response.ok) {
                        const data = await response.json();
                        console.log('Feedback submitted successfully:', data);
                        setFeedbackState(wasCorrect ? 'submitted_positive' : 'submitted_negative');
                    } else {
                        const errorText = await response.text();
                        console.error('Feedback submission failed:', response.status, errorText);
                    }
                } catch (error) {
                    console.error('Feedback submission error:', error);
                } finally {
                    setSubmitting(false);
                }
            };
            
            const handleThumbsUp = () => submitFeedback(true);
            
            const handleThumbsDown = () => {
                setShowCorrection(true);
                setFeedbackState('correcting');
            };
            
            const submitCorrection = () => {
                submitFeedback(false, correction);
                setShowCorrection(false);
            };
            
            // Show thank you message after positive feedback
            if (feedbackState === 'submitted_positive') {
                return (
                    <div className="p-4 bg-green-500/20 border border-green-500/50 rounded-lg">
                        <div className="flex items-center gap-3 text-green-300">
                            <i className="fas fa-check-circle text-2xl"></i>
                            <div>
                                <p className="font-medium">Thank you! 👍</p>
                                <p className="text-sm text-green-400/80">Your feedback helps improve future analyses.</p>
                            </div>
                        </div>
                    </div>
                );
            }
            
            // Show thank you message after negative feedback with correction
            if (feedbackState === 'submitted_negative') {
                return (
                    <div className="p-4 bg-blue-500/20 border border-blue-500/50 rounded-lg">
                        <div className="flex items-center gap-3 text-blue-300">
                            <i className="fas fa-graduation-cap text-2xl"></i>
                            <div>
                                <p className="font-medium">Correction received!</p>
                                <p className="text-sm text-blue-400/80">We'll use this to improve future analyses. Thank you!</p>
                            </div>
                        </div>
                    </div>
                );
            }
            
            return (
                <div className="p-4 bg-gray-700/30 border border-gray-600 rounded-lg">
                    <div className="flex items-center justify-between">
                        <span className="text-gray-300 font-medium">
                            <i className="fas fa-comment-dots mr-2"></i>
                            Was this analysis helpful?
                        </span>
                        
                        {!showCorrection && (
                            <div className="flex gap-2">
                                <button
                                    onClick={handleThumbsUp}
                                    disabled={submitting}
                                    className="px-4 py-2 bg-green-500/20 hover:bg-green-500/30 text-green-300 rounded-lg transition-all flex items-center gap-2 disabled:opacity-50">
                                    <i className="fas fa-thumbs-up"></i>
                                    Yes
                                </button>
                                <button
                                    onClick={handleThumbsDown}
                                    disabled={submitting}
                                    className="px-4 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-300 rounded-lg transition-all flex items-center gap-2 disabled:opacity-50">
                                    <i className="fas fa-thumbs-down"></i>
                                    No
                                </button>
                            </div>
                        )}
                    </div>
                    
                    {showCorrection && (
                        <div className="mt-4 space-y-3">
                            <p className="text-sm text-gray-400">
                                Help us improve! What was the actual root cause?
                            </p>
                            <textarea
                                value={correction.root_cause}
                                onChange={(e) => setCorrection({...correction, root_cause: e.target.value})}
                                placeholder="Describe the actual root cause..."
                                className="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-sm text-gray-200 placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                                rows={2}
                            />
                            <textarea
                                value={correction.fix}
                                onChange={(e) => setCorrection({...correction, fix: e.target.value})}
                                placeholder="What was the fix? (optional)"
                                className="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-sm text-gray-200 placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                                rows={2}
                            />
                            <div className="flex gap-2">
                                <button
                                    onClick={submitCorrection}
                                    disabled={submitting || !correction.root_cause}
                                    className="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-all flex items-center gap-2 disabled:opacity-50">
                                    <i className="fas fa-paper-plane"></i>
                                    Submit Correction
                                </button>
                                <button
                                    onClick={() => { setShowCorrection(false); setFeedbackState('pending'); }}
                                    className="px-4 py-2 bg-gray-600 hover:bg-gray-500 text-gray-200 rounded-lg transition-all">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // =====================================================================
        // Investigation Details (for deep mode)
        // =====================================================================
        
        function InvestigationDetails({ result }) {
            const { tool_calls_made, investigation_tokens, agentic_enhanced } = result;
            
            if (!agentic_enhanced) return null;
            
            return (
                <Collapsible title="Investigation Details" icon="fas fa-microscope" badge={`${tool_calls_made} tools`}>
                    <div className="space-y-3">

                                <i className="fas fa-tools text-purple-400 text-xl mb-1"></i>
                                <p className="text-2xl font-bold text-purple-300">{tool_calls_made}</p>
                                <p className="text-xs text-gray-400">Tool Calls</p>
                            </div>
                            <div className="p-3 bg-gray-700/50 rounded-lg text-center">

                                <p className="text-2xl font-bold text-yellow-300">{investigation_tokens || '~'}</p>
                                <p className="text-xs text-gray-400">Tokens Used</p>

                        </div>
                        <p className="text-sm text-gray-400">

                </Collapsible>

        // =====================================================================

        function AnalysisResult({ result }) {

            if (!result) return null;
            
            const {

                jenkinsfile_fetched, libraries_fetched,
                jenkins_description_updated, pr_comment_posted
            } = result;
            
            // DEBUG: Log failing_tool status
            console.log('=== DEBUG: failure_analysis ===', failure_analysis);
            console.log('=== DEBUG: failing_tool ===', failure_analysis?.failing_tool);
            console.log('=== DEBUG: tool_invocations ===', failure_analysis?.tool_invocations);
            
            const tabs = [
                { id: 'overview', label: 'Overview', icon: 'fas fa-home' },

                { id: 'details', label: 'Details', icon: 'fas fa-info-circle' },
                { id: 'actions', label: 'Actions', icon: 'fas fa-check-circle' },
            ];
            
            return (
                <Card className="overflow-hidden fade-in">
                    {/* Header */}
                    <div className="p-6 border-b border-gray-700">
                        <div className="flex flex-wrap items-start justify-between gap-4">
                            <div>
                                <h2 className="text-2xl font-bold flex items-center gap-3">
                                    <i className="fas fa-bug text-red-400"></i>
                                    {build_info?.job} #{build_info?.build_number}
                                </h2>
                                <div className="flex flex-wrap items-center gap-3 mt-2">
                                    <ModeBadge mode={analysis_mode} toolCalls={tool_calls_made} enhanced={agentic_enhanced} />
                                    <span className="text-sm text-gray-500">
                                        {metadata?.analysis_duration_ms}ms • {metadata?.model_used}
                                    </span>
                                </div>
                            </div>

                                <CategoryBadge category={failure_analysis?.category} />
                                <TierBadge tier={failure_analysis?.tier} />
                            </div>
                        </div>
                        
                        {failure_analysis?.failed_stage && (
                            <div className="mt-4 px-3 py-2 bg-gray-700/50 rounded-lg inline-flex items-center gap-2">
                                <i className="fas fa-layer-group text-yellow-400"></i>
                                <span className="text-gray-400">Failed Stage:</span>
                                <span className="font-mono text-yellow-300">{failure_analysis.failed_stage}</span>
                            </div>

                        {/* Failing Tool/Command */}
                        {failure_analysis?.failing_tool && (

                                <div className="flex items-center gap-2 mb-2">
                                    <i className="fas fa-terminal text-orange-400"></i>
                                    <span className="font-semibold text-orange-300">Failed Command</span>
                                </div>
                                <div className="space-y-1 text-sm">
                                    <div className="flex gap-2">

                                        <div className="space-y-2 text-sm">
                                            <p><span className="text-gray-400">Issue:</span> <span className="text-yellow-300">{config_analysis.primary_issue}</span></p>

                                                <div className="mt-2">

                                                    tool.exit_code && tool.exit_code !== 0

                                                        : 'bg-gray-700/50 border-gray-600'

                                                    <div className="flex items-center justify-between mb-2">
                                                        <span className="font-mono text-sm font-semibold text-orange-300">{tool.tool_name}</span>
                                                        {tool.exit_code !== null && tool.exit_code !== undefined && (
                                                            <span className={`text-xs px-2 py-0.5 rounded ${
                                                                tool.exit_code === 0 ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'

                                                    </div>
                                                    <code className="block text-xs bg-gray-900 p-2 rounded text-gray-300 break-all">
                                                        {tool.command_line}

                                                            {tool.output_lines.slice(0, 5).join('\n')}

                                {/* Raw JSON Toggle */}

                                        className="text-sm text-gray-500 hover:text-gray-300 flex items-center gap-2">

                                            {JSON.stringify(result, null, 2)}

                        )}
                        
                        {activeTab === 'actions' && (
                            <div className="space-y-4">
                                <h4 className="font-medium text-gray-300">Actions Performed</h4>
                                <div className="grid gap-3">
                                    <div className={`p-3 rounded-lg flex items-center gap-3 ${jenkins_description_updated ? 'bg-green-500/10 border border-green-500/30' : 'bg-gray-700/30'}`}>
                                        <i className={`fas ${jenkins_description_updated ? 'fa-check-circle text-green-400' : 'fa-circle text-gray-500'}`}></i>
                                        <div>
                                            <p className="font-medium">Jenkins Build Description</p>
                                            <p className="text-sm text-gray-400">{jenkins_description_updated ? 'Updated with analysis summary' : 'Not updated'}</p>
                                        </div>

                                    <div className={`p-3 rounded-lg flex items-center gap-3 ${pr_comment_posted ? 'bg-green-500/10 border border-green-500/30' : 'bg-gray-700/30'}`}>
                                        <i className={`fas ${pr_comment_posted ? 'fa-check-circle text-green-400' : 'fa-circle text-gray-500'}`}></i>
                                        <div>
                                            <p className="font-medium">PR/MR Comment</p>
                                            <p className="text-sm text-gray-400">{pr_comment_posted ? 'Analysis posted to PR' : 'No PR URL provided or posting disabled'}</p>
                                        </div>

                                {libraries_fetched?.length > 0 && (

        // =====================================================================
        // History Panel
        // =====================================================================
        
        function HistoryPanel({ history, onSelect, onClear }) {
            if (!history || history.length === 0) {
                return (
                    <Card className="p-4">
                        <h3 className="text-lg font-semibold mb-3 flex items-center gap-2">
                            <i className="fas fa-history text-gray-400"></i> Recent Analyses
                        </h3>
                        <p className="text-gray-500 text-sm">No analyses yet. Run your first analysis above.</p>
                    </Card>
                );
            }
            
            return (
                <Card className="p-4">
                    <div className="flex items-center justify-between mb-3">

                            <i className="fas fa-history text-gray-400"></i> Recent ({history.length})

                        <button onClick={onClear} className="text-xs text-gray-500 hover:text-red-400 transition-colors">
                            <i className="fas fa-trash mr-1"></i> Clear
                        </button>

                    <div className="space-y-2 max-h-80 overflow-y-auto scrollbar-thin">

                            <div key={i} onClick={() => onSelect(item)}
                                className="p-3 rounded-lg bg-gray-700/50 hover:bg-gray-700 cursor-pointer transition-colors">

                                    <span className="font-medium truncate text-sm max-w-[150px]">{item.build_info?.job}</span>
                                    <span className="text-xs text-gray-500">#{item.build_info?.build_number}</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className="text-xs px-2 py-0.5 rounded bg-gray-600 truncate max-w-[100px]">
                                        {item.failure_analysis?.category?.replace(/_/g, ' ')}

        // =====================================================================
        // Knowledge Management Panel
        // =====================================================================
        
        function KnowledgePanel() {
            const [tools, setTools] = useState([]);
            const [docs, setDocs] = useState([]);
            const [stats, setStats] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('tools');
            const [selectedTool, setSelectedTool] = useState(null);
            const [selectedDoc, setSelectedDoc] = useState(null);
            const [importUrl, setImportUrl] = useState('');
            const [importToolName, setImportToolName] = useState('');
            const [importLoading, setImportLoading] = useState(false);
            const [importResult, setImportResult] = useState(null);
            const [editingTool, setEditingTool] = useState(null);
            const [editForm, setEditForm] = useState({});
            const [createToolFromDoc, setCreateToolFromDoc] = useState(null);
            const [newToolName, setNewToolName] = useState('');
            
            useEffect(() => {
                loadData();
            }, []);
            
            const loadData = async () => {
                setLoading(true);
                try {
                    const [toolsRes, statsRes, docsRes] = await Promise.all([
                        fetch(`${API_BASE}/knowledge/tools`),
                        fetch(`${API_BASE}/knowledge/stats`),
                        fetch(`${API_BASE}/knowledge/docs`)
                    ]);
                    
                    if (toolsRes.ok) {
                        const data = await toolsRes.json();
                        setTools(data.tools || []);
                    }
                    if (statsRes.ok) {
                        setStats(await statsRes.json());
                    }
                    if (docsRes.ok) {
                        const data = await docsRes.json();
                        setDocs(data.docs || []);
                    }
                } catch (e) {
                    console.error('Failed to load knowledge data:', e);
                } finally {
                    setLoading(false);
                }
            };
            
            const handleDeleteDoc = async (docId) => {
                if (!confirm('Delete this document?')) return;
                
                try {
                    const res = await fetch(`${API_BASE}/knowledge/docs/${docId}`, {
                        method: 'DELETE'
                    });
                    
                    if (res.ok) {
                        setSelectedDoc(null);
                        loadData();
                    }
                } catch (e) {
                    console.error('Delete doc failed:', e);
                }
            };
            
            const handleCreateToolFromDoc = async () => {
                if (!createToolFromDoc || !newToolName.trim()) return;
                
                try {
                    // Re-import the doc URL with a tool name to create the tool
                    // Pass link_doc_id to update the existing doc's tool reference
                    const res = await fetch(`${API_BASE}/knowledge/import-doc`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            url: createToolFromDoc.source_url,
                            tool_name: newToolName.trim(),
                            save: false,  // Don't duplicate the doc
                            save_tool: true,
                            link_doc_id: createToolFromDoc.id  // Link existing doc to new tool
                        })
                    });
                    
                    if (res.ok) {
                        setCreateToolFromDoc(null);
                        setNewToolName('');
                        loadData();
                        setActiveTab('tools');
                    } else {
                        const data = await res.json();
                        alert('Failed to create tool: ' + (data.detail || 'Unknown error'));
                    }
                } catch (e) {
                    console.error('Create tool failed:', e);
                    alert('Failed to create tool: ' + e.message);
                }
            };
            
            const handleImportDoc = async () => {
                if (!importUrl) return;
                
                setImportLoading(true);
                setImportResult(null);
                
                try {
                    const res = await fetch(`${API_BASE}/knowledge/import-doc`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            url: importUrl, 
                            tool_name: importToolName || undefined,
                            save: true,
                            save_tool: true
                        })
                    });
                    
                    const data = await res.json();
                    
                    if (res.ok) {
                        setImportResult({ success: true, data });
                        setImportUrl('');
                        setImportToolName('');
                        loadData();
                    } else {
                        setImportResult({ success: false, error: data.detail || 'Import failed' });
                    }
                } catch (e) {
                    setImportResult({ success: false, error: e.message });
                } finally {
                    setImportLoading(false);
                }
            };
            
            const handleDeleteTool = async (toolId) => {
                if (!confirm('Delete this tool?')) return;
                
                try {
                    const res = await fetch(`${API_BASE}/knowledge/tools/${toolId}`, {
                        method: 'DELETE'
                    });
                    
                    if (res.ok) {
                        setSelectedTool(null);
                        loadData();
                    }
                } catch (e) {
                    console.error('Delete failed:', e);
                }
            };
            
            const handleEditTool = (tool) => {
                setEditingTool(tool);
                setEditForm({
                    name: tool.name || '',
                    category: tool.category || 'internal',
                    description: tool.description || '',
                    docs_url: tool.docs_url || '',
                    patterns_commands: (tool.patterns_commands || []).join('\n'),
                    patterns_env_vars: (tool.patterns_env_vars || []).join('\n'),
                    aliases: (tool.aliases || []).join(', '),
                });
            };
            
            const handleSaveEdit = async () => {
                if (!editingTool) return;
                
                try {
                    const updatedTool = {
                        ...editingTool,
                        name: editForm.name,
                        category: editForm.category,
                        description: editForm.description,
                        docs_url: editForm.docs_url,
                        patterns_commands: editForm.patterns_commands.split('\n').filter(c => c.trim()),
                        patterns_env_vars: editForm.patterns_env_vars.split('\n').filter(e => e.trim()),
                        aliases: editForm.aliases.split(',').map(a => a.trim()).filter(a => a),
                    };
                    
                    const res = await fetch(`${API_BASE}/knowledge/tools/${editingTool.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updatedTool)
                    });
                    
                    if (res.ok) {
                        setEditingTool(null);
                        setSelectedTool(null);
                        loadData();
                    } else {
                        alert('Failed to save changes');
                    }
                } catch (e) {
                    console.error('Save failed:', e);
                    alert('Failed to save: ' + e.message);
                }
            };
            
            if (loading) {
                return (
                    <Card className="p-8 text-center">
                        <i className="fas fa-spinner fa-spin text-2xl text-indigo-400"></i>
                        <p className="mt-2 text-gray-400">Loading knowledge base...</p>
                    </Card>
                );
            }
            
            return (
                <div className="space-y-4">
                    {/* Stats Overview */}
                    {stats && (
                        <div className="grid grid-cols-4 gap-4">
                            <Card className="p-4 text-center">
                                <div className="text-2xl font-bold text-indigo-400">{stats.total_tools || 0}</div>
                                <div className="text-xs text-gray-500">Tools</div>
                            </Card>
                            <Card className="p-4 text-center">
                                <div className="text-2xl font-bold text-green-400">{stats.total_errors || 0}</div>
                                <div className="text-xs text-gray-500">Error Patterns</div>
                            </Card>
                            <Card className="p-4 text-center">
                                <div className="text-2xl font-bold text-purple-400">{stats.total_docs || 0}</div>
                                <div className="text-xs text-gray-500">Docs</div>
                            </Card>
                            <Card className="p-4 text-center">
                                <div className="text-2xl font-bold text-yellow-400">{stats.total_analyses || 0}</div>
                                <div className="text-xs text-gray-500">Source Analyses</div>
                            </Card>
                        </div>
                    )}
                    
                    {/* Tabs */}
                    <div className="flex gap-2 border-b border-gray-700 pb-2">
                        {['tools', 'docs', 'import'].map(tab => (
                            <button
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                className={`px-4 py-2 rounded-t text-sm font-medium transition-colors ${
                                    activeTab === tab 
                                        ? 'bg-gray-700 text-white' 
                                        : 'text-gray-400 hover:text-white'
                                }`}
                            >
                                {tab === 'tools' && <><i className="fas fa-tools mr-2"></i>Tools ({tools.length})</>}
                                {tab === 'docs' && <><i className="fas fa-file-alt mr-2"></i>Docs ({docs.length})</>}
                                {tab === 'import' && <><i className="fas fa-file-import mr-2"></i>Import</>}
                            </button>

        // =====================================================================
        // Training Dashboard Panel
        // =====================================================================
        
        function TrainingPanel() {
            const [stats, setStats] = useState(null);
            const [jobs, setJobs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [creating, setCreating] = useState(false);
            const [newJobName, setNewJobName] = useState('');
            const [newJobFormat, setNewJobFormat] = useState('jsonl_openai');
            const [actionLoading, setActionLoading] = useState(null);
            
            useEffect(() => {
                loadData();
            }, []);
            
            const loadData = async () => {
                setLoading(true);
                try {
                    const [statsRes, jobsRes] = await Promise.all([
                        fetch(`${API_BASE}/training/stats`),
                        fetch(`${API_BASE}/training/jobs`)
                    ]);
                    
                    if (statsRes.ok) setStats(await statsRes.json());
                    if (jobsRes.ok) {
                        const data = await jobsRes.json();
                        setJobs(data.jobs || []);
                    }
                } catch (e) {
                    console.error('Failed to load training data:', e);
                } finally {
                    setLoading(false);
                }
            };
            
            const createJob = async () => {
                if (!newJobName) return;
                
                setCreating(true);
                try {
                    const res = await fetch(`${API_BASE}/training/jobs`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: newJobName,
                            format: newJobFormat,
                            include_feedback: true,
                            include_knowledge: true
                        })
                    });
                    
                    if (res.ok) {
                        setNewJobName('');
                        loadData();
                    }
                } catch (e) {
                    console.error('Failed to create job:', e);
                } finally {
                    setCreating(false);
                }
            };
            
            const runJobAction = async (jobId, action) => {
                setActionLoading(`${jobId}-${action}`);
                try {
                    const res = await fetch(`${API_BASE}/training/jobs/${jobId}/${action}`, {
                        method: 'POST'
                    });
                    
                    if (res.ok) {
                        loadData();
                    }
                } catch (e) {
                    console.error(`Failed to ${action} job:`, e);
                } finally {
                    setActionLoading(null);
                }
            };
            
            const downloadJob = (jobId) => {
                window.open(`${API_BASE}/training/jobs/${jobId}/download`, '_blank');
            };
            
            const getStatusBadge = (status) => {
                const styles = {
                    pending: 'bg-gray-500',
                    preparing: 'bg-yellow-500',
                    ready: 'bg-blue-500',
                    exporting: 'bg-purple-500',
                    completed: 'bg-green-500',
                    failed: 'bg-red-500'
                };
                return `text-xs px-2 py-1 rounded ${styles[status] || 'bg-gray-500'}`;
            };
            
            if (loading) {
                return (
                    <Card className="p-8 text-center">
                        <i className="fas fa-spinner fa-spin text-2xl text-indigo-400"></i>
                        <p className="mt-2 text-gray-400">Loading training data...</p>
                    </Card>
                );
            }
            
            return (
                <div className="space-y-4">
                    {/* Stats Overview */}
                    {stats && (
                        <div className="grid grid-cols-4 gap-4">
                            <Card className="p-4 text-center">
                                <div className="text-2xl font-bold text-indigo-400">{stats.total_examples || 0}</div>
                                <div className="text-xs text-gray-500">Total Examples</div>
                            </Card>
                            <Card className="p-4 text-center">
                                <div className="text-2xl font-bold text-green-400">{stats.validated_examples || 0}</div>
                                <div className="text-xs text-gray-500">Validated</div>
                            </Card>
                            <Card className="p-4 text-center">
                                <div className="text-2xl font-bold text-purple-400">
                                    {Math.round((stats.validation_rate || 0) * 100)}%
                                </div>
                                <div className="text-xs text-gray-500">Validation Rate</div>
                            </Card>
                            <Card className="p-4 text-center">
                                <div className="text-2xl font-bold text-yellow-400">{stats.completed_jobs || 0}</div>
                                <div className="text-xs text-gray-500">Completed Jobs</div>
                            </Card>
                        </div>
                    )}
                    
                    {/* Create Job */}
                    <Card className="p-4">
                        <h4 className="font-medium mb-3">
                            <i className="fas fa-plus-circle text-green-400 mr-2"></i>
                            Create Training Job
                        </h4>
                        <div className="flex gap-2">
                            <input
                                type="text"
                                value={newJobName}
                                onChange={(e) => setNewJobName(e.target.value)}
                                placeholder="Job name (e.g., finetune-v1)"
                                className="flex-1 px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500"
                            />
                            <select

                            </button>

                    {/* Jobs List */}

                        <h4 className="font-medium mb-3">
                            <i className="fas fa-tasks text-indigo-400 mr-2"></i>
                            Training Jobs

                        {jobs.length === 0 ? (
                            <div className="text-center py-8 text-gray-500">

                                        <div className="flex items-center justify-between text-sm">
