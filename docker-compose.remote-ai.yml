version: '3.8'

# Jenkins Failure Analysis Agent - Remote AI API Configuration
# 
# Use this when connecting to a remote AI service:
#   - OpenAI API (gpt-4-turbo, gpt-4o - best for deep investigation)
#   - Azure OpenAI
#   - Remote vLLM server
#   - Anthropic Claude API
#   - Any OpenAI-compatible API endpoint
#
# Usage:
#   1. Set your API credentials in .env:
#      AI_BASE_URL=https://api.openai.com/v1
#      AI_MODEL=gpt-4-turbo
#      AI_API_KEY=sk-your-key-here
#
#   2. Start:
#      docker-compose -f docker-compose.remote-ai.yml up -d
#
# Note: Using cloud APIs means your Jenkins logs will be sent to the provider.
# Recommended models for deep investigation: gpt-4-turbo, gpt-4o, claude-3-opus

services:
  # =============================================================================
  # Jenkins Failure Analysis Agent (API Server)
  # =============================================================================
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins-failure-agent
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - agent_data:/app/data
      - agent_reports:/app/reports
    environment:
      # AI Configuration - Remote API
      # Set these in .env file
      - AI_BASE_URL=${AI_BASE_URL:?Set AI_BASE_URL in .env}
      - AI_MODEL=${AI_MODEL:?Set AI_MODEL in .env}
      - AI_API_KEY=${AI_API_KEY:?Set AI_API_KEY in .env}
      - AI_TIMEOUT=${AI_TIMEOUT:-120}
      
      # Jenkins Configuration
      - JENKINS_URL=${JENKINS_URL:-http://host.docker.internal:8080}
      - JENKINS_USERNAME=${JENKINS_USERNAME:-admin}
      - JENKINS_API_TOKEN=${JENKINS_API_TOKEN:-}
      
      # GitHub Enterprise Configuration (for fetching source code)
      - GITHUB_BASE_URL=${GITHUB_BASE_URL:-https://api.github.com}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_ENABLED=${GITHUB_ENABLED:-false}
      
      # SCM Configuration (for PR comments)
      - SCM_PROVIDER=${SCM_PROVIDER:-github}
      - SCM_API_URL=${SCM_API_URL:-https://api.github.com}
      - SCM_TOKEN=${SCM_TOKEN:-}
      - SCM_ENABLED=${SCM_ENABLED:-false}
      - SCM_AUTO_COMMENT=${SCM_AUTO_COMMENT:-true}
      - SCM_SET_COMMIT_STATUS=${SCM_SET_COMMIT_STATUS:-true}
      
      # Reporter settings
      - UPDATE_JENKINS_DESCRIPTION=${UPDATE_JENKINS_DESCRIPTION:-true}
      - POST_TO_PR=${POST_TO_PR:-true}
      
      # Server settings
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    command: ["python", "agent.py", "serve", "--host", "0.0.0.0", "--port", "8080"]

  # =============================================================================
  # Web UI - Dashboard for Analysis
  # =============================================================================
  ui:
    image: nginx:alpine
    container_name: jenkins-failure-ui
    ports:
      - "3000:80"
    volumes:
      - ./ui/index.html:/usr/share/nginx/html/index.html:ro
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - agent
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # =============================================================================
  # Agent CLI - For one-off analysis commands
  # =============================================================================
  agent-cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins-failure-agent-cli
    env_file:
      - .env
    profiles:
      - cli
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - agent_reports:/app/reports
    environment:
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_MODEL=${AI_MODEL}
      - AI_API_KEY=${AI_API_KEY}
      - JENKINS_URL=${JENKINS_URL:-http://host.docker.internal:8080}
      - JENKINS_USERNAME=${JENKINS_USERNAME:-admin}
      - JENKINS_API_TOKEN=${JENKINS_API_TOKEN:-}
      - GITHUB_BASE_URL=${GITHUB_BASE_URL:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - SCM_PROVIDER=${SCM_PROVIDER:-github}
      - SCM_TOKEN=${SCM_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["python", "agent.py"]

  # =============================================================================
  # Jenkins (Optional) - For local testing
  # =============================================================================
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    profiles:
      - with-jenkins
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  agent_data:
    name: jenkins-agent-data
  agent_reports:
    name: jenkins-agent-reports
  jenkins_home:
    name: jenkins-agent-jenkins

networks:
  default:
    name: jenkins-failure-agent-network
